name: Generate contributors image

# 手动触发：Actions 页面 → Run workflow
on:
  workflow_dispatch:

# 需要写权限才能 commit 修改后的 README
permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Update contributors in README files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/update-contributors-md.js

      - name: Commit and push
        # 后续部署由 .github/workflows/static.yml 的 push 事件自动触发
        # （static.yml 的 push.paths 已加入 README.md / docs/README_zh-cn.md）
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs/README_zh-cn.md src/index.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(contributors): regenerate contributors list in README files"
            git push
          fi
