name: Generate contributors image

# 手动触发：Actions 页面 → Run workflow
on:
  workflow_dispatch:

# 需要写权限才能 commit 生成的 SVG
permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Generate contributors SVG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/generate-contributors-svg.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/assets/img/contributors.svg
          # 仅当文件有变化时再 commit
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(contributors): regenerate contributors image"
            git push
          fi
