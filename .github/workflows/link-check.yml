name: Link & HTML Check

on:
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - ".eleventy.js"
      - "package.json"
      - "package-lock.json"
  pull_request:
    branches: ["main"]
    paths:
      - "src/**"
      - ".eleventy.js"
      - "package.json"
      - "package-lock.json"

permissions:
  contents: read

# 并发策略：PR 内新 push 自动取消旧的链接检查任务，
# 避免重复构建占用 Actions 配额；main 分支的检查不取消，确保每次都跑完
concurrency:
  group: "link-check-${{ github.ref }}"
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - name: Check internal links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --no-progress --exclude-loopback _site/**/*.html
          fail: true
